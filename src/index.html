<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="styles.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Nametag Generator</title>
        <script type="module" src="/main.js" defer></script>
    </head>

    <body>
        <div id="app">
            <header class="header">
                <h1>Nametag Generator</h1>
                <div class="header-right">
                    <div
                        class="spinner hidden"
                        id="spinner"
                        aria-label="Compiling..."
                    >
                        Compiling...
                    </div>
                </div>
            </header>

            <div class="layout">
                <!-- Controls -->
                <section class="panel">
                    <h2>Inputs</h2>

                    <div class="field">
                        <label>CSV</label>
                        <div class="row">
                            <button id="btnPickCsv" type="button">
                                Chose CSV...
                            </button>
                            <div id="csvPath" class="path">No CSV Selected</div>
                        </div>
                    </div>

                    <div class="field">
                        <label>Resources (images etc.)</label>
                        <div class="row">
                            <button id="btnAddResources" type="button">
                                Add resources...
                            </button>
                            <button
                                id="btnClearResources"
                                type="button"
                                class="secondary"
                            >
                                Clear
                            </button>
                        </div>
                        <ul id="resourcesList" class="list"></ul>
                        <div class="hint"></div>
                    </div>
                </section>
            </div>

            <div></div>
        </div>
    </body>
</html>
